# FinPulse Backend - Production Profile
# All values MUST come from environment variables

spring:
  r2dbc:
    pool:
      initial-size: 20
      max-size: 200
  flyway:
    clean-disabled: true
    baseline-on-migrate: false

logging:
  level:
    com.finpulse: INFO
    org.springframework.r2dbc: WARN
    org.springframework.security: WARN

server:
  port: 8080
