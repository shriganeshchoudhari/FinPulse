# FinPulse Helm Chart Values

global:
  environment: "prod"

backend:
  replicaCount: 3
  image:
    repository: finpulse/backend
    pullPolicy: IfNotPresent
    tag: "latest"
  
  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
    requests:
      cpu: 250m
      memory: 512Mi

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "8m"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: api.finpulse.local
        paths:
          - path: /
            pathType: Prefix

  # Added database and infrastructure configurations
  config:
    dbUrl: "r2dbc:postgresql://finpulse-timescaledb:5432/finpulse"
    flywayUrl: "jdbc:postgresql://finpulse-timescaledb:5432/finpulse"
    kafkaServers: "finpulse-kafka:9092"
    redisHost: "finpulse-redis"
    redisPort: 6379

frontend:
  replicaCount: 2
  image:
    repository: finpulse/frontend
    pullPolicy: IfNotPresent
    tag: "latest"
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

simulator:
  replicaCount: 1
  image:
    repository: finpulse/market-simulator
    pullPolicy: IfNotPresent
    tag: "latest"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

notifications:
  replicaCount: 2
  image:
    repository: finpulse/notification-engine
    pullPolicy: IfNotPresent
    tag: "latest"
  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
    requests:
      cpu: 250m
      memory: 512Mi
