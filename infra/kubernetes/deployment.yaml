# deployment.yaml
# Production Kubernetes Deployment for FinPulse Core Services

apiVersion: apps/v1
kind: Deployment
metadata:
  name: finpulse-backend-deployment
  namespace: finpulse
  labels:
    app: finpulse-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: finpulse-backend
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: finpulse-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
    spec:
      containers:
      - name: core-backend
        image: finpulse/backend-core:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "prod"
        - name: SPRING_R2DBC_URL
          value: "r2dbc:postgresql://postgres-service.finpulse.svc.cluster.local:5432/finpulse"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:postgresql://postgres-service.finpulse.svc.cluster.local:5432/finpulse"
        - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-service.finpulse.svc.cluster.local:9092"
        - name: SPRING_DATA_REDIS_HOST
          value: "redis-service.finpulse.svc.cluster.local"
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: "500m"
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: finpulse-backend-service
  namespace: finpulse
spec:
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: finpulse-backend
  type: ClusterIP
