apiVersion: v1
kind: Secret
metadata:
  name: finpulse-backend-secret
  labels:
    app: finpulse-backend
type: Opaque
data:
  # Base64 encoded values should be provided here in actual deployment
  DB_USERNAME: {{ "postgres" | b64enc }}
  DB_PASSWORD: {{ "password" | b64enc }}
  JWT_SECRET: {{ "this-is-a-secure-jwt-secret-key-that-should-be-changed" | b64enc }}
