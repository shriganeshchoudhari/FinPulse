apiVersion: apps/v1
kind: Deployment
metadata:
  name: finpulse-notification-engine
  labels:
    app: finpulse-notification-engine
spec:
  replicas: {{ .Values.notifications.replicaCount }}
  selector:
    matchLabels:
      app: finpulse-notification-engine
  template:
    metadata:
      labels:
        app: finpulse-notification-engine
    spec:
      containers:
        - name: notifications
          image: "{{ .Values.notifications.image.repository }}:{{ .Values.notifications.image.tag }}"
          imagePullPolicy: {{ .Values.notifications.image.pullPolicy }}
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "{{ .Values.backend.config.kafkaServers }}"
          resources:
            {{- toYaml .Values.notifications.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: finpulse-notification-svc
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
      name: http
  selector:
    app: finpulse-notification-engine
