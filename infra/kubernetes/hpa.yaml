# hpa.yaml
# Horizontal Pod Autoscaler for FinPulse Core Services

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: finpulse-backend-hpa
  namespace: finpulse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: finpulse-backend-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
